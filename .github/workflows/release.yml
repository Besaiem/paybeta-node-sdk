name: Release

on:
  push:
    branches:
      - main

# Only one release job runs at a time; queued runs wait rather than cancel.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Version bump & changelog
    runs-on: ubuntu-latest

    # Skip commits created by the release process itself to prevent loops.
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"

    permissions:
      contents: write   # push release commit + tag

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history required for conventional-changelog
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release -- --ci
